<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050510">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StacFund">
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=4">
    <link rel="apple-touch-icon" href="/icon.svg?v=4">
    <link rel="manifest" href="/manifest.json?v=4">
    <title>StacFund - Power Your Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050510;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a1a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        .animate-shimmer {
          background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
          background-size: 200% 100%;
          animation: shimmer 2s infinite;
        }
        @keyframes pulse-logo {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>

</head>
<body>
    <div id="root">
        <div style="display:flex;height:100vh;justify-content:center;align-items:center;background-color:#050510;flex-direction:column;gap:20px;">
           <img src="https://plain-apac-prod-public.komododecks.com/202605/18/MVQzOoGi4sCDyhKzfhaM/image.png" alt="StacFund Logo" referrerPolicy="no-referrer" style="width:100px;height:100px;object-fit:contain;animation:pulse-logo 2s infinite ease-in-out;">
           <div style="color:#6b7280;font-weight:600;font-size:0.875rem;letter-spacing:0.05em;font-family:'Inter',sans-serif;">Loading StacFund...</div>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Add a try-catch to prevent origin mismatch errors from logging loudly
          try {
             navigator.serviceWorker.register('/sw.js')
               .then(reg => console.log('SW registered'))
               .catch(err => console.log('SW registration skipped (expected in preview):', err.message));
          } catch (e) {
             console.log('SW initialization skipped');
          }
        });
      }
    </script>

</body>
</html>
