<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#050510" rx="128" />
  <g filter="url(#shadow)">
    <rect x="120" y="140" width="272" height="60" rx="30" fill="url(#grad)" />
    <rect x="120" y="226" width="272" height="60" rx="30" fill="url(#grad)" opacity="0.8" />
    <rect x="120" y="312" width="272" height="60" rx="30" fill="url(#grad)" opacity="0.6" />
  </g>
</svg>
